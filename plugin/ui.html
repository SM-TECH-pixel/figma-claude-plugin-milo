<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #eee; padding: 12px; font-size: 12px; }
  h2 { color: #1BC9AD; font-size: 13px; margin-bottom: 10px; letter-spacing: 0.05em; }
  #status { padding: 6px 10px; border-radius: 4px; margin-bottom: 10px; font-size: 11px; background: #2a2a2a; color: #888; }
  #status.connected { background: #0d2e28; color: #1BC9AD; }
  #status.running  { background: #2a2a0d; color: #c9b91b; }
  #status.error    { background: #2a1a1a; color: #cf6f6f; }
  #log { background: #111; border-radius: 4px; padding: 8px; height: 160px; overflow-y: auto; font-family: monospace; font-size: 10px; color: #aaa; }
  .log-entry { border-bottom: 1px solid #222; padding: 3px 0; }
  .log-entry.success { color: #1BC9AD; }
  .log-entry.err { color: #cf6f6f; }
  #manual { margin-top: 10px; }
  textarea { width: 100%; height: 60px; background: #111; color: #eee; border: 1px solid #333; border-radius: 4px; padding: 6px; font-family: monospace; font-size: 10px; resize: vertical; }
  .row { display: flex; gap: 6px; margin-top: 6px; }
  button { flex: 1; padding: 7px; background: #1BC9AD; color: #000; border: none; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 12px; }
  button:hover { background: #15A890; }
  button.secondary { background: #333; color: #aaa; }
  button.secondary:hover { background: #444; }
  .label { color: #666; font-size: 10px; margin-top: 8px; margin-bottom: 4px; display: block; }
</style>
</head>
<body>
<h2>Claude Script Runner ✦</h2>
<div id="status">Connecting to bridge on localhost:3333...</div>
<div id="log"></div>
<div id="manual">
  <span class="label">Manual script</span>
  <textarea id="script" placeholder="// Write a Figma script here&#10;figma.notify('Hello!')"></textarea>
  <div class="row">
    <button onclick="runManual()">Run Script</button>
    <button class="secondary" onclick="clearLog()">Clear</button>
  </div>
</div>

<script>
  const SERVER = 'http://localhost:3333'
  let knownVersion = 0
  let currentLabel = 'Untitled script'
  let lastVersion = 0
  const statusEl = document.getElementById('status')
  const logEl = document.getElementById('log')

  function addLog(msg, type = '') {
    const el = document.createElement('div')
    el.className = 'log-entry ' + type
    el.textContent = new Date().toLocaleTimeString() + '  ' + msg
    logEl.prepend(el)
  }

  function setStatus(msg, cls = '') {
    statusEl.textContent = msg
    statusEl.className = cls
  }

  function clearLog() {
    logEl.innerHTML = ''
  }

  function runScript(script, label) {
    currentLabel = label || 'manual'
    lastVersion = knownVersion
    setStatus('Running: ' + currentLabel, 'running')
    parent.postMessage({ pluginMessage: { type: 'run-script', script } }, '*')
  }

  function runManual() {
    const script = document.getElementById('script').value.trim()
    if (!script) return
    runScript(script, 'manual')
  }

  async function poll() {
    try {
      const res = await fetch(`${SERVER}/poll?since=${knownVersion}`)
      if (!res.ok) throw new Error('bad response')
      const data = await res.json()
      setStatus('Bridge connected — listening for scripts', 'connected')
      if (data.script) {
        knownVersion = data.version
        document.getElementById('script').value = data.script
        runScript(data.script, data.label || 'script v' + data.version)
      }
    } catch {
      setStatus('Bridge offline — run server.js and watch.js in terminal', '')
    }
    setTimeout(poll, 800)
  }

  window.addEventListener('message', (ev) => {
    const msg = ev.data?.pluginMessage
    if (!msg || msg.type !== 'script-result') return
    if (msg.success) {
      addLog('OK: ' + msg.output, 'success')
      setStatus('Done: ' + currentLabel, 'connected')
      parent.postMessage({
        pluginMessage: {
          type: 'post-output',
          payload: { label: currentLabel, version: lastVersion, success: true, output: msg.output }
        }
      }, '*')
    } else {
      addLog('ERR: ' + msg.error, 'err')
      setStatus('Error in: ' + currentLabel, 'error')
      parent.postMessage({
        pluginMessage: {
          type: 'post-output',
          payload: { label: currentLabel, version: lastVersion, success: false, error: msg.error }
        }
      }, '*')
    }
  })

  poll()
</script>
</body>
</html>
